<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillPath — Personal Progress Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ── THEMES ─────────────────────────────────────────────────────────────── */
:root,[data-theme="dark"]{
  --bg:#0f0f14;--surface:#16161f;--surface2:#1e1e2a;--surface3:#252533;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8e8f0;--muted:#7070a0;--muted2:#4a4a70;
  --accent:#7c6aff;--accent-glow:rgba(124,106,255,0.15);
  --green:#3dd68c;--green-bg:rgba(61,214,140,0.08);
  --amber:#f5c842;--amber-bg:rgba(245,200,66,0.08);
  --coral:#ff6b6b;--coral-bg:rgba(255,107,107,0.08);
  --blue:#5ab4ff;--blue-bg:rgba(90,180,255,0.08);
  --purple:#b06aff;--teal:#2de0c8;
  --sidebar-w:220px;
}
[data-theme="light"]{
  --bg:#f4f4f8;--surface:#ffffff;--surface2:#f0f0f5;--surface3:#e4e4ec;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1a1a2e;--muted:#6060a0;--muted2:#a0a0c0;
  --accent:#5c4aff;--accent-glow:rgba(92,74,255,0.1);
  --green:#1db87a;--green-bg:rgba(29,184,122,0.08);
  --amber:#d4a017;--amber-bg:rgba(212,160,23,0.08);
  --coral:#e85555;--coral-bg:rgba(232,85,85,0.08);
  --blue:#3a9ae8;--blue-bg:rgba(58,154,232,0.08);
}
[data-theme="ocean"]{
  --bg:#0a1628;--surface:#0d1f3c;--surface2:#112650;--surface3:#163060;
  --border:rgba(100,180,255,0.1);--border2:rgba(100,180,255,0.2);
  --text:#c8e8ff;--muted:#5a90c0;--muted2:#3a6080;
  --accent:#00d4ff;--accent-glow:rgba(0,212,255,0.12);
  --green:#00e5a0;--green-bg:rgba(0,229,160,0.08);
  --amber:#ffc947;--amber-bg:rgba(255,201,71,0.08);
  --coral:#ff6b9d;--coral-bg:rgba(255,107,157,0.08);
  --blue:#5ab4ff;--blue-bg:rgba(90,180,255,0.08);
}
[data-theme="forest"]{
  --bg:#0c1a0f;--surface:#122016;--surface2:#1a2e1e;--surface3:#223828;
  --border:rgba(80,200,100,0.1);--border2:rgba(80,200,100,0.18);
  --text:#d0f0d8;--muted:#6a9a74;--muted2:#3a6040;
  --accent:#4ddb7c;--accent-glow:rgba(77,219,124,0.12);
  --green:#4ddb7c;--green-bg:rgba(77,219,124,0.08);
  --amber:#e8c840;--amber-bg:rgba(232,200,64,0.08);
  --coral:#ff7055;--coral-bg:rgba(255,112,85,0.08);
  --blue:#50c8a0;--blue-bg:rgba(80,200,160,0.08);
}
[data-theme="sunset"]{
  --bg:#1a0f18;--surface:#22101f;--surface2:#2e1428;--surface3:#3a1a34;
  --border:rgba(255,100,180,0.1);--border2:rgba(255,100,180,0.18);
  --text:#f0d0e8;--muted:#a06080;--muted2:#603050;
  --accent:#ff6eb0;--accent-glow:rgba(255,110,176,0.12);
  --green:#80e8a0;--green-bg:rgba(128,232,160,0.08);
  --amber:#ffb84d;--amber-bg:rgba(255,184,77,0.08);
  --coral:#ff5555;--coral-bg:rgba(255,85,85,0.08);
  --blue:#b06aff;--blue-bg:rgba(176,106,255,0.08);
}

/* ── BASE ────────────────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
body{display:flex;overflow:hidden}

/* ── SIDEBAR ─────────────────────────────────────────────────────────────── */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .25s,min-width .25s;
  position:relative;z-index:100;
}
.sidebar.collapsed{width:52px!important;min-width:52px!important;}
.sidebar.collapsed .nav-label,.sidebar.collapsed .nav-section,
.sidebar.collapsed .logo-title,.sidebar.collapsed .logo-sub,
.sidebar.collapsed .streak-label,.sidebar.collapsed .streak-num{display:none}
.sidebar.collapsed .nav-item{padding:10px;justify-content:center;gap:0;border-left:3px solid transparent}
.sidebar.collapsed .nav-icon{min-width:unset;font-size:18px}
.sidebar.collapsed .streak-badge{padding:8px;justify-content:center}
.sidebar.collapsed .logo{padding:14px 0;display:flex;justify-content:center;align-items:center}
.sidebar.collapsed #sb-collapse-btn svg{transform:rotate(180deg)}
#sb-collapse-btn{position:absolute;bottom:60px;right:-14px;z-index:200;width:28px;height:28px;background:var(--surface);border:1px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.2)}
#sb-collapse-btn:hover{color:var(--accent);border-color:var(--accent)}
.logo{padding:20px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo-title{font-family:'DM Serif Display',serif;font-size:19px;color:var(--text);letter-spacing:.3px;white-space:nowrap}
.logo-sub{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap}
.nav{flex:1;overflow-y:auto;padding:10px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;transition:all .18s;border-left:3px solid transparent;white-space:nowrap}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--accent);background:var(--accent-glow);border-left-color:var(--accent)}
.nav-icon{font-size:16px;min-width:20px;text-align:center;flex-shrink:0}
.nav-label{overflow:hidden;white-space:nowrap}
.nav-section{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;padding:10px 18px 3px;font-weight:600;white-space:nowrap}
.sidebar-bottom{padding:14px 18px;border-top:1px solid var(--border);flex-shrink:0}
.streak-badge{background:var(--amber-bg);border:1px solid rgba(245,200,66,0.2);border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:8px}
.streak-num{font-size:20px;font-weight:600;color:var(--amber);white-space:nowrap}
.streak-label{font-size:11px;color:var(--muted);white-space:nowrap}

/* Mobile hamburger */
#mobile-menu-btn{display:none;position:fixed;top:12px;left:12px;z-index:200;background:var(--surface);border:1px solid var(--border2);border-radius:8px;width:38px;height:38px;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--text)}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99}

/* ── MAIN ────────────────────────────────────────────────────────────────── */
.main{flex:1;overflow-y:auto;background:var(--bg);display:flex;flex-direction:column;min-width:0}
.topbar{padding:16px 24px 0;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.page-title{font-family:'DM Serif Display',serif;font-size:24px;color:var(--text)}
.page-sub{font-size:12px;color:var(--muted);margin-top:2px}
.content{padding:18px 24px 40px;flex:1}
#topbar-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}

/* ── CARDS ───────────────────────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.card-grid{display:grid;gap:12px}
.grid2{grid-template-columns:1fr 1fr}
.grid3{grid-template-columns:1fr 1fr 1fr}
.grid4{grid-template-columns:repeat(4,1fr)}
.stat{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.stat-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:6px;font-weight:600}
.stat-val{font-size:22px;font-weight:600;line-height:1}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}

/* ── BUTTONS ─────────────────────────────────────────────────────────────── */
.btn{padding:7px 14px;border-radius:8px;border:1px solid var(--border2);cursor:pointer;font-size:12px;font-weight:500;background:var(--surface2);color:var(--text);transition:all .18s;font-family:'DM Sans',sans-serif}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-accent:hover{opacity:.88;color:#fff}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-green{background:var(--green-bg);color:var(--green);border-color:rgba(61,214,140,0.2)}
.btn-green:hover{background:var(--green);color:#000}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--muted2);font-size:14px;padding:3px 6px;border-radius:5px;transition:color .2s}
.icon-btn:hover{color:var(--coral)}

/* ── INPUTS ──────────────────────────────────────────────────────────────── */
input,select,textarea{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
select option{background:var(--surface2)}
textarea{resize:vertical;min-height:70px}
.input-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:flex-end}
.input-row input,.input-row select{flex:1;min-width:120px}
.label{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:500;display:block}
.field{margin-bottom:10px}

/* ── COMPONENTS (reuse from original) ───────────────────────────────────── */
.timer-block{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border)}
.timer-block:last-child{border-bottom:none}
.timer-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.timer-name{font-size:13px;font-weight:500;min-width:90px}
.timer-display{font-size:22px;font-weight:600;font-variant-numeric:tabular-nums;min-width:100px;letter-spacing:2px}
.timer-btns{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.progress-track{height:5px;background:var(--surface3);border-radius:3px;margin-top:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}
.skill-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;transition:border .2s}
.skill-card:hover{border-color:var(--border2)}
.skill-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.skill-color{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.skill-name{font-size:14px;font-weight:600;flex:1}
.skill-hours{font-size:11px;color:var(--muted);margin-left:auto}
.skill-bar-wrap{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.skill-bar-label{font-size:10px;color:var(--muted);min-width:52px}
.skill-bar{flex:1;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
.skill-bar-fill{height:100%;border-radius:3px}
.skill-topics{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.topic-chip{font-size:10px;padding:3px 10px;border-radius:20px;background:var(--surface3);color:var(--muted);font-weight:500;cursor:default}
.skill-actions{display:flex;gap:6px;margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.todo-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.todo-item:last-child{border-bottom:none}
.todo-check{width:16px;height:16px;accent-color:var(--accent);flex-shrink:0;margin-top:2px;cursor:pointer}
.todo-body{flex:1}
.todo-text{font-size:13px}
.todo-text.done{text-decoration:line-through;color:var(--muted)}
.todo-meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:8px;align-items:center}
.tag{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:600}
.tag-week{background:rgba(90,180,255,0.1);color:var(--blue)}
.tag-month{background:rgba(176,106,255,0.1);color:var(--purple)}
.tag-todo{background:rgba(61,214,140,0.08);color:var(--green)}
.tag-skill{background:rgba(124,106,255,0.1);color:var(--accent)}
.tag-habit{background:rgba(245,200,66,0.1);color:var(--amber)}
.priority-high{color:var(--coral);font-size:10px}
.priority-med{color:var(--amber);font-size:10px}
.dl-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.dl-item:last-child{border-bottom:none}
.dl-date-badge{background:var(--surface3);border-radius:8px;padding:5px 10px;text-align:center;min-width:52px;flex-shrink:0}
.dl-day{font-size:16px;font-weight:700;line-height:1}
.dl-month{font-size:9px;color:var(--muted);text-transform:uppercase}
.dl-info{flex:1}
.dl-title{font-size:13px;font-weight:500}
.dl-sub{font-size:11px;color:var(--muted);margin-top:2px}
.dl-urgent .dl-date-badge{background:var(--coral-bg);border:1px solid rgba(255,107,107,0.2)}
.dl-urgent .dl-day{color:var(--coral)}
.days-left{font-size:10px;padding:2px 8px;border-radius:20px}
.days-ok{background:var(--green-bg);color:var(--green)}
.days-warn{background:var(--amber-bg);color:var(--amber)}
.days-over{background:var(--coral-bg);color:var(--coral)}
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:12px 0}
.hm-day-label{font-size:9px;color:var(--muted);text-align:center;padding-bottom:2px}
.hm-cell{height:32px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted2);transition:all .2s;cursor:default;border:1px solid transparent}
.hm-cell.has1{background:rgba(124,106,255,0.2);color:var(--accent)}
.hm-cell.has2{background:rgba(124,106,255,0.4);color:#a89fff}
.hm-cell.has3{background:rgba(124,106,255,0.65);color:#fff}
.hm-cell.today{border-color:var(--amber)!important;color:var(--amber)}
.hm-cell.empty-before{opacity:0}
.hm-cell.clickable{cursor:pointer}
.hm-cell.clickable:hover{transform:scale(1.1);z-index:1}
.log-entry{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.log-date{font-size:11px;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between}
.log-skill{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:2px}
.log-topic{font-size:13px;color:var(--text)}
.log-times{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
.log-time-item{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.log-time-dot{width:7px;height:7px;border-radius:50%}
.log-note{font-size:12px;color:var(--muted);margin-top:6px;border-top:1px solid var(--border);padding-top:6px;font-style:italic}
.habit-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.habit-row:last-child{border-bottom:none}
.habit-name{flex:1;font-size:13px;font-weight:500}
.habit-dots{display:flex;gap:5px}
.habit-dot{width:22px;height:22px;border-radius:6px;background:var(--surface3);border:1.5px solid var(--border2);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted2)}
.habit-dot.done{background:var(--green-bg);border-color:rgba(61,214,140,0.4);color:var(--green)}
.score-ring{width:100px;height:100px;position:relative;margin:0 auto 12px}
.score-ring svg{transform:rotate(-90deg)}
.score-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;font-weight:700;font-family:'DM Serif Display',serif}
.empty{color:var(--muted);font-size:13px;text-align:center;padding:2rem 0;font-style:italic}
.divider{height:1px;background:var(--border);margin:14px 0}
.flex-row{display:flex;gap:8px;align-items:center}
.ml-auto{margin-left:auto}
.skill-color-pick{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.color-swatch{width:22px;height:22px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:border .2s}
.color-swatch.selected{border-color:#fff}

/* ── MODAL ───────────────────────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:24px;width:440px;max-width:100%;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.close-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;line-height:1;padding:2px 6px}
.close-btn:hover{color:var(--coral)}

/* ── NOTIFICATION ────────────────────────────────────────────────────────── */
.notification{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--green);border-radius:10px;padding:10px 16px;font-size:13px;color:var(--green);z-index:2000;opacity:0;transform:translateY(10px);transition:all .3s}
.notification.show{opacity:1;transform:translateY(0)}

/* ── LOGIN ───────────────────────────────────────────────────────────────── */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px}
.login-box{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:36px;width:380px;max-width:100%;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.login-logo{font-family:'DM Serif Display',serif;font-size:24px;color:var(--text);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:22px}
.login-tabs{display:flex;gap:4px;background:var(--surface2);border-radius:10px;padding:4px;margin-bottom:18px}
.login-tab{flex:1;padding:7px;border:none;background:none;color:var(--muted);font-size:13px;font-weight:600;border-radius:7px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s}
.login-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.2)}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.login-field input{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;transition:border .2s;box-sizing:border-box}
.login-field input:focus{outline:none;border-color:var(--accent)}
.login-btn{width:100%;padding:12px;border-radius:12px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:6px;transition:opacity .2s}
.login-btn:hover{opacity:.85}
.login-btn:disabled{opacity:.55;cursor:not-allowed}
.login-error{color:var(--coral);font-size:12px;margin-top:8px;min-height:16px;text-align:center}
.login-success-msg{color:var(--green);font-size:12px;margin-top:8px;min-height:16px;text-align:center}
.login-footer{text-align:center;margin-top:14px;font-size:12px;color:var(--muted2)}
.login-footer a{color:var(--accent);cursor:pointer}
.login-spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:lspin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes lspin{to{transform:rotate(360deg)}}

/* ── SAVE INDICATOR ──────────────────────────────────────────────────────── */
#save-indicator{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-size:11px;background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:4px 12px;opacity:0;transition:opacity .3s;z-index:500;pointer-events:none}
#save-indicator.show{opacity:1}

/* ── SETTINGS ────────────────────────────────────────────────────────────── */
.theme-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:10px}
.theme-card{border-radius:12px;padding:14px;cursor:pointer;border:2px solid var(--border2);transition:all .2s;text-align:center}
.theme-card:hover{border-color:var(--accent)}
.theme-card.active{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.theme-preview{height:40px;border-radius:8px;margin-bottom:8px}
.theme-name{font-size:12px;font-weight:600;color:var(--text)}

/* ── USER BAR ────────────────────────────────────────────────────────────── */
#sb-user-bar{padding:8px 18px 4px;border-bottom:1px solid var(--border);display:none;align-items:center;gap:6px;flex-shrink:0}

/* ── SKILL SLIDER ────────────────────────────────────────────────────────── */
.skill-slider{position:relative;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:18px 20px;overflow:hidden;min-height:160px}
.skill-slide{display:none;animation:fadeSlide .4s ease}
.skill-slide.active{display:block}
@keyframes fadeSlide{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.slider-nav{display:flex;align-items:center;justify-content:space-between;margin-top:14px}
.slider-dots{display:flex;gap:5px;justify-content:center}
.slider-dot{width:7px;height:7px;border-radius:50%;background:var(--surface3);border:1.5px solid var(--border2);cursor:pointer;transition:all .2s}
.slider-dot.active{background:var(--accent);border-color:var(--accent)}
.slider-btn{background:var(--surface3);border:1px solid var(--border2);border-radius:8px;width:30px;height:30px;cursor:pointer;color:var(--muted);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.slider-btn:hover{border-color:var(--accent);color:var(--accent)}
/* deadline inside skill slide */
.skill-dl-item{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px}
.skill-dl-item:last-child{border-bottom:none}

/* ── DASHBOARD LAYOUT VARIANTS ───────────────────────────────────────────── */
[data-dash="compact"] .card{padding:12px 14px;margin-bottom:10px}
[data-dash="compact"] .stat{padding:10px 12px}
[data-dash="compact"] .stat-val{font-size:18px}
[data-dash="focus"] .card-grid.grid4{grid-template-columns:1fr 1fr}
[data-dash="focus"] #dash-week-row{display:none}

<script>



// ============ OFFLINE-ONLY INIT ============
var _saveTimer=null;

// ── THEME & SETTINGS ──────────────────────────────────────────────────────
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t||'dark');
  localStorage.setItem('sp_theme',t||'dark');
}
function loadTheme(){
  var t=localStorage.getItem('sp_theme')||'dark';
  applyTheme(t);
}

// ── SIDEBAR COLLAPSE ──────────────────────────────────────────────────────
function toggleSidebarCollapse(){
  var sb=document.getElementById('sidebar');
  sb.classList.toggle('collapsed');
  localStorage.setItem('sp_sidebar_collapsed',sb.classList.contains('collapsed')?'1':'0');
}
function applySidebarCollapse(){
  if(localStorage.getItem('sp_sidebar_collapsed')==='1'){
    var sb=document.getElementById('sidebar');
    if(sb)sb.classList.add('collapsed');
  }
}

// ── MOBILE SIDEBAR ────────────────────────────────────────────────────────
function toggleSidebar(){
  var sb=document.getElementById('sidebar');
  var ov=document.getElementById('sidebar-overlay');
  if(sb.classList.contains('open')){sb.classList.remove('open');ov.classList.remove('open');}
  else{sb.classList.add('open');ov.classList.add('open');}
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// ── SAVE / LOAD ───────────────────────────────────────────────────────────
function save(){
  try{
    var d=JSON.stringify(DB);
    localStorage.setItem('skillpath_v3',d);
    localStorage.setItem('skillpath_v3_bak',d);
    _showSave('✓ Saved');
  }catch(e){_showSave('⚠ Save failed');}
}

function _showSave(msg){
  var el=document.getElementById('save-indicator');
  if(!el)return;
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(function(){el.classList.remove('show');},2000);
}

function load(){
  try{
    var d=localStorage.getItem('skillpath_v3')||localStorage.getItem('skillpath_v3_bak');
    if(d){DB=JSON.parse(d);}
  }catch(e){}
}

function _ensureDBFields(){
  if(!DB.skills)DB.skills=[];
  if(!DB.sessions)DB.sessions=[];
  if(!DB.todos)DB.todos=[];
  if(!DB.dailyTodos)DB.dailyTodos={};
  if(!DB.deadlines)DB.deadlines=[];
  if(!DB.habits)DB.habits=[];
  if(!DB.habitLog)DB.habitLog={};
  if(!DB.notes)DB.notes={folders:[]};
  if(!DB.routine)DB.routine={slots:[],dailyProgress:{}};
  if(!DB.routine.slots)DB.routine.slots=[];
  if(!DB.routine.dailyProgress)DB.routine.dailyProgress={};
  if(!DB.routine.snapshots)DB.routine.snapshots={};
  if(!DB.skillSnapshots)DB.skillSnapshots={};
  if(!DB.settings)DB.settings={theme:'dark'};
  initDailySnapshot(today());
}

// ── IMPORT / EXPORT ───────────────────────────────────────────────────────
function exportData(){
  try{
    var blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='skillpath_backup_'+today()+'.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    notify('✓ Data exported!');
  }catch(e){notify('Export failed: '+e.message);}
}

function importData(){
  var inp=document.createElement('input');
  inp.type='file';inp.accept='.json,application/json';
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var parsed=JSON.parse(ev.target.result);
        if(!parsed.skills&&!parsed.sessions&&!parsed.routine){
          notify('⚠ Invalid backup file!');return;
        }
        if(!confirm('This will REPLACE all current data. Are you sure?'))return;
        DB=parsed;
        _ensureDBFields();
        save();
        notify('✓ Data imported! Reloading...');
        setTimeout(function(){location.reload();},1200);
      }catch(err){notify('⚠ Could not read file: '+err.message);}
    };
    reader.readAsText(file);
  };
  inp.click();
}

function load(){
  try{var d=localStorage.getItem('skillpath_v3');if(d){DB=JSON.parse(d);}}catch(e){}
  // Ensure all needed structures exist
  if(!DB.dailyTodos)DB.dailyTodos={};
  if(!DB.notes)DB.notes={folders:[]};
  if(!DB.routine)DB.routine={slots:[],dailyProgress:{}};
  if(!DB.routine.snapshots)DB.routine.snapshots={};
  if(!DB.skillSnapshots)DB.skillSnapshots={};
  // Save today's snapshot immediately on load (once per day)
  initDailySnapshot(today());
}
function initDailySnapshot(d){
  var isToday=(d===today());
  if(!DB.routine.snapshots)DB.routine.snapshots={};
  // ALWAYS refresh today's snapshot from live slots (so adds/removes reflect immediately)
  // Only freeze PAST dates (never overwrite them)
  if(isToday||!DB.routine.snapshots[d]){
    var wday=new Date(d+'T12:00').getDay();
    var daySlots=(DB.routine.slots||[]).filter(function(s){
      if(s.days&&s.days.length>0)return s.days.includes(wday);
      return true;
    });
    DB.routine.snapshots[d]=daySlots.map(function(s){

function notify(msg){var el=document.getElementById('notif');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}

function localDateStr(d){var dt=d||new Date();return dt.getFullYear()+'-'+pad(dt.getMonth()+1)+'-'+pad(dt.getDate());}
function today(){return localDateStr(new Date());}
function fmt(secs){var h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;return pad(h)+':'+pad(m)+':'+pad(s);}
function hm(secs){var h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60);return h+'h '+m+'m';}
function pad(n){return n<10?'0'+n:''+n;}
function today_formatted(){var d=new Date();return DAY_NAMES[d.getDay()]+', '+d.getDate()+' '+MON_NAMES[d.getMonth()]+' '+d.getFullYear();}
function days_between(a,b){return Math.ceil((new Date(a+'T12:00')-new Date(b+'T12:00'))/(1000*60*60*24));}
function get_week_dates(){var dates=[];for(var i=6;i>=0;i--){var d=new Date();d.setDate(d.getDate()-i);dates.push(localDateStr(d));}return dates;}
function get_month_dates(){
  var d=new Date();
  var year=window._viewYear!==undefined?window._viewYear:d.getFullYear();
  var month=window._viewMonth!==undefined?window._viewMonth:d.getMonth();
  return{year:year,month:month,days:new Date(year,month+1,0).getDate(),firstDay:new Date(year,month,1).getDay()};
}
function navMonth(dir){
  var cur=get_month_dates();
  var m=cur.month+dir;
  var y=cur.year;
  if(m<0){m=11;y--;}
  if(m>11){m=0;y++;}
  window._viewYear=y;window._viewMonth=m;
  renders.monthly();
}
function jumpToMonth(m){
  window._viewMonth=parseInt(m);
  renders.monthly();
}
function jumpToYear(y){
  window._viewYear=parseInt(y);
  renders.monthly();
}
function skill_by_id(id){return DB.skills.find(s=>s.id===id);}
function calc_streak(){
  var d=new Date();var streak=0;
  for(var i=0;i<365;i++){
    var ds=d.toISOString().slice(0,10);
    var has=DB.sessions.some(s=>s.date===ds)|| (DB.habitLog[ds]&&Object.values(DB.habitLog[ds]).some(v=>v));
    if(has)streak++;else if(i>0)break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function today_secs(){
  var d=today();
  var total={learn:0,prac:0,read:0};
  DB.sessions.filter(s=>s.date===d).forEach(s=>{total.learn+=s.learn||0;total.prac+=s.prac||0;total.read+=s.read||0;});
  return total;
}
function skill_total(skillId){
  var total={learn:0,prac:0};
  DB.sessions.filter(s=>s.skillId===skillId).forEach(s=>{total.learn+=s.learn||0;total.prac+=s.prac||0;});
  return total;
}
function calc_score(){
  var week=get_week_dates();
  var days_with_sessions=week.filter(d=>DB.sessions.some(s=>s.date===d)).length;
  var total_secs=0;
  week.forEach(d=>DB.sessions.filter(s=>s.date===d).forEach(s=>total_secs+=((s.learn||0)+(s.prac||0)+(s.read||0))));
  var score=Math.min(100,Math.round((days_with_sessions/7*50)+(Math.min(total_secs,7*GOAL_SECS)/(7*GOAL_SECS)*50)));
  return score;
}

  notes: function(){
    if(!DB.notes)DB.notes={folders:[]};
    document.getElementById('topbar-actions').innerHTML=
      '<button class="btn btn-accent" onclick="notesAddFolder()">+ New Folder</button>';
    var html='';
    if(!DB.notes.folders.length){
      html='<div class="card"><div class="empty">No folders yet. Click &quot;+ New Folder&quot; to get started.</div></div>';
    } else {
      html=DB.notes.folders.map(function(folder){
        var filesHtml='';
        if(folder.files&&folder.files.length){
          filesHtml=folder.files.map(function(file){
            return '<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;transition:background .15s;margin-bottom:2px" '
              +'onmouseover="this.style.background=\'var(--surface3)\'" onmouseout="this.style.background=\'transparent\'" '
              +'onclick="notesOpenFile(\''+folder.id+'\',\''+file.id+'\')">'
              +'<span style="font-size:15px">'+notesFileIcon(file.type)+'</span>'
              +'<span style="flex:1;font-size:13px;font-weight:500">'+file.name+'</span>'
              +'<span style="font-size:10px;color:var(--muted2)">'+(file.updatedAt||file.createdAt||'')+'</span>'
              +'<button class="icon-btn" onclick="event.stopPropagation();notesDeleteFile(\''+folder.id+'\',\''+file.id+'\')" style="opacity:.5">✕</button>'
              +'</div>';

          filesHtml='<div style="font-size:12px;color:var(--muted2);font-style:italic;padding:6px 10px">Empty folder</div>';
        }

          +'<span style="font-size:15px;font-weight:700;flex:1">'+folder.name+'</span>'

          +'<button class="icon-btn" onclick="notesDeleteFolder(\''+folder.id+'\')" style="color:var(--muted2)">✕</button>'

  habits: function(){
    var week=get_week_dates();
    document.getElementById('topbar-actions').innerHTML=`<button class="btn btn-accent" onclick="addHabit()">+ Add Habit</button>`;

      var dotHtml=week.map(d=>{
        var done=DB.habitLog[d]&&DB.habitLog[d][h.id];
        return `<div class="habit-dot ${done?'done':''}" onclick="toggleHabit('${h.id}','${d}')" title="${d}">${done?'✓':''}</div>`;
      }).join('');
      var weekDone=week.filter(d=>DB.habitLog[d]&&DB.habitLog[d][h.id]).length;
      return `<div class="habit-row">
        <div style="width:10px;height:10px;border-radius:3px;background:${h.color||'var(--accent)'}"></div>
        <div class="habit-name">${h.name}</div>
        <div style="font-size:10px;color:var(--muted);margin-right:8px">${weekDone}/7</div>
        <div class="habit-dots">${dotHtml}</div>
        <button class="icon-btn" onclick="deleteHabit('${h.id}')">✕</button>
      </div>`;

    <div class="card">
      <div class="card-title">Daily Habits — This Week</div>
      <div style="display:flex;justify-content:flex-end;gap:5px;margin-bottom:8px">
        ${week.map(d=>{var dt=new Date(d+'T12:00');return `<div style="width:22px;text-align:center;font-size:9px;color:var(--muted)">${DAY_NAMES[dt.getDay()]}</div>`;}).join('')}
        <div style="width:22px"></div>
      </div>
      ${habitsHtml}
    </div>`;
  },


  weekly: function(){
    var week=get_week_dates();
    var stats={learn:0,prac:0,read:0,sessions:0};
    week.forEach(d=>{
      DB.sessions.filter(s=>s.date===d).forEach(s=>{
        stats.learn+=s.learn||0;stats.prac+=s.prac||0;stats.read+=s.read||0;stats.sessions++;
      });
    });
    var skillStats={};
    DB.skills.forEach(sk=>{
      var t={learn:0,prac:0,topics:[]};
      DB.sessions.filter(s=>s.date>=week[0]&&s.date<=week[6]&&s.skillId===sk.id).forEach(s=>{
        t.learn+=s.learn||0;t.prac+=s.prac||0;
        if(s.topic&&!t.topics.includes(s.topic))t.topics.push(s.topic);
      });
      if(t.learn||t.prac)skillStats[sk.id]={...t,sk};
    });
    var weekDeadlines=DB.deadlines.filter(d=>d.type==='week'&&!d.done);
    routineInit();
    var slots=DB.routine.slots;

    // Build weekly routine table
    var weekRoutineHtml='';
    if(slots.length){
      var headerCells=week.map(d=>{
        var dt=new Date(d+'T12:00');
        var isT=d===today();
        var secs=0;DB.sessions.filter(s=>s.date===d).forEach(s=>secs+=(s.learn||0)+(s.prac||0));
        return `<th style="padding:8px 6px;font-size:11px;font-weight:600;color:${isT?'var(--amber)':'var(--muted)'};text-align:center;cursor:pointer;border-bottom:2px solid var(--border2)" onclick="showDayDetail('${d}')" title="Click to see details">
          <div>${DAY_NAMES[dt.getDay()]}</div>
          <div style="font-size:13px;font-weight:700;color:${isT?'var(--amber)':'var(--text)'}">${dt.getDate()}</div>
          ${secs>0?`<div style="font-size:9px;color:var(--green);margin-top:2px">${hm(secs)}</div>`:`<div style="font-size:9px;color:var(--muted2);margin-top:2px">—</div>`}
        </th>`;
      }).join('');
      var bodyRows=slots.map(s=>{
        var cells=week.map(d=>{
          var prog=DB.routine.dailyProgress[d]||{};
          var done=!!prog[s.id];
          return `<td style="padding:6px;text-align:center">
            <div style="width:28px;height:28px;border-radius:7px;margin:0 auto;background:${done?'var(--green-bg)':'var(--surface3)'};border:1.5px solid ${done?'rgba(61,214,140,0.3)':'var(--border)'};display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;transition:all .2s" onclick="toggleRoutineWeek('${s.id}','${d}')" title="${d}">${done?'✓':''}</div>
          </td>`;
        }).join('');
        return `<tr style="border-bottom:1px solid var(--border)">
          <td style="padding:8px 10px;white-space:nowrap">
            <div style="display:flex;align-items:center;gap:7px">
              <div style="width:8px;height:8px;border-radius:2px;background:${s.color||'var(--accent)'}"></div>
              <div>
                <div style="font-size:12px;font-weight:500">${s.task}</div>
                <div style="font-size:10px;color:var(--muted)">${s.time||''}</div>
              </div>
            </div>
          </td>
          ${cells}
        </tr>`;
      }).join('');
      weekRoutineHtml=`<div class="card" style="margin-top:14px">
        <div class="card-title">Weekly Routine <span style="font-size:11px;font-weight:400;color:var(--muted)">Click a day header to see full details</span></div>
        <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead><tr>
            <th style="padding:8px 10px;text-align:left;font-size:11px;color:var(--muted);font-weight:600;border-bottom:2px solid var(--border2)">TASK</th>
            ${headerCells}
          </tr></thead>
          <tbody>${bodyRows}</tbody>
        </table>
        </div>
      </div>`;
    }

    document.getElementById('main-content').innerHTML=`
    <div class="card-grid grid4" style="margin-bottom:14px">
      <div class="stat"><div class="stat-label">Learning</div><div class="stat-val" style="color:var(--accent)">${hm(stats.learn)}</div><div class="stat-sub">this week</div></div>
      <div class="stat"><div class="stat-label">Practice</div><div class="stat-val" style="color:var(--green)">${hm(stats.prac)}</div><div class="stat-sub">this week</div></div>
      <div class="stat"><div class="stat-label">Reading</div><div class="stat-val" style="color:var(--amber)">${hm(stats.read)}</div><div class="stat-sub">this week</div></div>
      <div class="stat"><div class="stat-label">Sessions</div><div class="stat-val" style="color:var(--coral)">${stats.sessions}</div><div class="stat-sub">logged</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="card">
        <div class="card-title">Activity Map <span style="font-size:11px;font-weight:400;color:var(--muted)">Click day to see details</span></div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">
          ${week.map(d=>{
            var dt=new Date(d+'T12:00');
            var secs=0;DB.sessions.filter(s=>s.date===d).forEach(s=>secs+=(s.learn||0)+(s.prac||0));
            var level=secs>7200?'has3':secs>3600?'has2':secs>0?'has1':'';
            var isT=d===today();
            return `<div style="text-align:center">
              <div style="font-size:9px;color:${isT?'var(--amber)':'var(--muted)'};margin-bottom:3px">${DAY_NAMES[dt.getDay()]}</div>
              <div class="hm-cell ${level} ${isT?'today':''}" style="cursor:pointer" onclick="showDayDetail('${d}')" title="Click for details">${dt.getDate()}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-title">Weekly Deadlines</div>
        ${weekDeadlines.length?weekDeadlines.map(d=>{
          var diff=days_between(d.date,today());
          return `<div style="display:flex;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
            <span style="flex:1;font-size:13px">${d.text}</span>
            <span class="days-left ${diff<=3?'days-over':'days-ok'}">${diff===0?'Today':diff<0?'Overdue':diff+'d'}</span>
            <input type="checkbox" ${d.done?'checked':''} onchange="toggleDeadline('${d.id}')">
          </div>`;
        }).join(''):'<div class="empty">No weekly deadlines</div>'}
      </div>
    </div>
    ${Object.keys(skillStats).length?`<div class="card" style="margin-top:14px">
      <div class="card-title">Skill Breakdown — This Week</div>
      ${Object.values(skillStats).map(({sk,learn,prac,topics})=>`
      <div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)">
        <div style="width:10px;height:10px;border-radius:3px;background:${sk.color}"></div>
        <div style="font-size:13px;font-weight:600;min-width:120px">${sk.name}</div>
        <div style="font-size:11px;color:var(--muted)">Learn: ${hm(learn)} · Practice: ${hm(prac)}</div>
        <div style="flex:1;display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end">
          ${topics.map(t=>`<span class="topic-chip">${t}</span>`).join('')}
        </div>
      </div>`).join('')}
    </div>`:''}
    ${weekRoutineHtml}`;
  },

  monthly: function(){
    var {year,month,days,firstDay}=get_month_dates();
    var monthKey=`${year}-${pad(month+1)}`;
    var stats={learn:0,prac:0,read:0,sessions:0,days:new Set()};
    DB.sessions.filter(s=>s.date.startsWith(monthKey)).forEach(s=>{
      stats.learn+=s.learn||0;stats.prac+=s.prac||0;stats.read+=s.read||0;stats.sessions++;stats.days.add(s.date);
    });
    var skillStats={};
    DB.skills.forEach(sk=>{
      var t={learn:0,prac:0,topics:[]};
      DB.sessions.filter(s=>s.date.startsWith(monthKey)&&s.skillId===sk.id).forEach(s=>{
        t.learn+=s.learn||0;t.prac+=s.prac||0;
        if(s.topic&&!t.topics.includes(s.topic))t.topics.push(s.topic);
      });
      if(t.learn||t.prac)skillStats[sk.id]={...t,sk};
    });
    var cells='';
    for(var i=0;i<firstDay;i++)cells+='<div class="hm-cell empty-before"></div>';
    for(var d=1;d<=days;d++){
      var ds=`${year}-${pad(month+1)}-${pad(d)}`;
      var secs=0;DB.sessions.filter(s=>s.date===ds).forEach(s=>secs+=(s.learn||0)+(s.prac||0));
      var level=secs>7200?'has3':secs>3600?'has2':secs>0?'has1':'';
      cells+=`<div class="hm-cell ${level} ${ds===today()?'today':''}" style="font-size:10px;cursor:pointer" onclick="showDayDetail('${ds}')" title="Click for details">${d}</div>`;
    }
    var monthDeadlines=DB.deadlines.filter(d=>d.type==='month'&&d.date.startsWith(monthKey));
    document.getElementById('main-content').innerHTML=`
    <div class="card-grid grid4" style="margin-bottom:14px">
      <div class="stat" style="grid-column:1/-1;display:flex;align-items:center;justify-content:center;gap:10px;background:transparent;padding:0 0 8px 0;border-bottom:1px solid var(--border);flex-wrap:wrap">
        <button onclick="navMonth(-1)" style="background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:14px;font-family:DM Sans,sans-serif">&#8592;</button>
        <select onchange="jumpToMonth(this.value)" style="font-size:14px;font-weight:600;background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:5px 10px;cursor:pointer;font-family:DM Sans,sans-serif">
          ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'].map(function(mn,mi){return '<option value="'+mi+'"'+(mi===month?' selected':'')+'>'+mn+'</option>';}).join('')}
        </select>
        <select onchange="jumpToYear(this.value)" style="font-size:14px;font-weight:600;background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:5px 10px;cursor:pointer;font-family:DM Sans,sans-serif">
          ${(function(){var opts='';for(var y=2023;y<=new Date().getFullYear()+1;y++){opts+='<option value="'+y+'"'+(y===year?' selected':'')+'>'+y+'</option>';}return opts;})()}
        </select>
        <button onclick="navMonth(1)" style="background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:14px;font-family:DM Sans,sans-serif">&#8594;</button>
      </div>
      <div class="stat"><div class="stat-label">Learning</div><div class="stat-val" style="color:var(--accent)">${hm(stats.learn)}</div><div class="stat-sub">${MON_NAMES[month]}</div></div>
      <div class="stat"><div class="stat-label">Practice</div><div class="stat-val" style="color:var(--green)">${hm(stats.prac)}</div><div class="stat-sub">${MON_NAMES[month]}</div></div>
      <div class="stat"><div class="stat-label">Study</div><div class="stat-val" style="color:var(--amber)">${hm(stats.read)}</div><div class="stat-sub">${MON_NAMES[month]}</div></div>
      <div class="stat"><div class="stat-label">Active Days</div><div class="stat-val" style="color:var(--coral)">${stats.days.size}/${days}</div><div class="stat-sub">days studied</div></div>
      <div class="stat"><div class="stat-label">Sessions</div><div class="stat-val" style="color:var(--purple)">${stats.sessions}</div><div class="stat-sub">logged</div></div>
    </div>
    <div style="display:grid;grid-template-columns:3fr 2fr;gap:14px;margin-bottom:14px">
      <div class="card">
        <div class="card-title" style="display:flex;align-items:center;gap:8px">
          <button onclick="navMonth(-1)" style="background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:2px 10px;cursor:pointer;font-size:16px;font-family:DM Sans,sans-serif">&#8592;</button>
          <span style="flex:1">${MON_NAMES[month]} ${year} — Activity Heatmap</span>
          <button onclick="navMonth(1)" style="background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:2px 10px;cursor:pointer;font-size:16px;font-family:DM Sans,sans-serif">&#8594;</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px">
          ${DAY_NAMES.map(d=>`<div style="font-size:9px;color:var(--muted);text-align:center">${d}</div>`).join('')}
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${cells}</div>
        <div style="display:flex;gap:10px;margin-top:10px">
          <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)"><div style="width:10px;height:10px;border-radius:3px;background:var(--surface2);border:1px solid var(--border)"></div>None</div>
          <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)"><div style="width:10px;height:10px;border-radius:3px;background:rgba(124,106,255,0.2)"></div>&lt;1h</div>
          <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)"><div style="width:10px;height:10px;border-radius:3px;background:rgba(124,106,255,0.4)"></div>1-2h</div>

        </div>
      </div>
      <div class="card">
        <div class="card-title">Monthly Deadlines</div>
        ${monthDeadlines.length?monthDeadlines.map(d=>{
          var diff=days_between(d.date,today());
          return `<div style="display:flex;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">

          </div>`;

      ${(()=>{

        var allDays=[];
        for(var dd=1;dd<=daysInMonth;dd++){allDays.push(year+'-'+pad(month+1)+'-'+pad(dd));}
        // header row = slot names
        var slotHeaders=slots.map(s=>`<th style="padding:5px 4px;font-size:9px;color:var(--muted);font-weight:600;text-align:center;max-width:40px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${s.task}"><div style="width:8px;height:8px;border-radius:2px;background:${s.color||'var(--accent)'};margin:0 auto 2px"></div>${s.task.slice(0,6)}</th>`).join('');

          var prog=DB.routine.dailyProgress[ds]||{};

          }).join('');

            <td style="padding:5px 8px;white-space:nowrap;font-size:11px;font-weight:${isT?700:400};color:${isT?'var(--amber)':'var(--text)'}">${DAY_NAMES[dt.getDay()]} ${dt.getDate()}</td>
            <td style="padding:5px 4px;font-size:10px;color:${secs>0?'var(--green)':'var(--muted2)'};white-space:nowrap">${secs>0?hm(secs):'—'}</td>
            <td style="padding:5px 4px;font-size:10px;color:var(--muted);white-space:nowrap">${doneCnt}/${slots.length}</td>
            ${cells2}
          </tr>`;
        }).join('');
        return `<div style="overflow-x:auto;max-height:420px;overflow-y:auto">
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead style="position:sticky;top:0;background:var(--surface);z-index:1">
            <tr style="border-bottom:2px solid var(--border2)">
              <th style="padding:6px 8px;text-align:left;font-size:11px;color:var(--muted);font-weight:600">DATE</th>
              <th style="padding:6px 4px;font-size:11px;color:var(--muted);font-weight:600;text-align:center">STUDY</th>
              <th style="padding:6px 4px;font-size:11px;color:var(--muted);font-weight:600;text-align:center">DONE</th>
              ${slotHeaders}
            </tr>
          </thead>
          <tbody>${bodyRows}</tbody>
        </table></div>`;
      })()}
    </div>
    ${Object.keys(skillStats).length?`<div class="card" style="margin-top:14px">
      <div class="card-title">Monthly Skill Progress</div>
      ${Object.values(skillStats).map(({sk,learn,prac,topics})=>`
      <div style="padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <div style="width:10px;height:10px;border-radius:3px;background:${sk.color}"></div>
          <div style="font-size:13px;font-weight:600">${sk.name}</div>
          <div style="font-size:11px;color:var(--muted);margin-left:auto">Learn: ${hm(learn)} · Practice: ${hm(prac)}</div>
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          ${topics.map(t=>`<span class="topic-chip">${t}</span>`).join('')}
        </div>
      </div>`).join('')}
    </div>`:''}`;
  }
};
function showDayDetail(d){
  var dt=new Date(d+'T12:00');
  var dayLabel=DAY_NAMES[dt.getDay()]+', '+dt.getDate()+' '+MON_NAMES[dt.getMonth()]+' '+dt.getFullYear();
  var sessions=DB.sessions.filter(function(s){return s.date===d;});
  var learn=0,prac=0,read=0;
  sessions.forEach(function(s){learn+=s.learn||0;prac+=s.prac||0;read+=s.read||0;});
  // Routine - use frozen snapshot so deleted/changed routines still show
  routineInit();
  var dateWday=new Date(d+'T12:00').getDay();
  var slots;
  if(DB.routine&&DB.routine.snapshots&&DB.routine.snapshots[d]&&DB.routine.snapshots[d].length>=0){
    slots=DB.routine.snapshots[d];
  } else {
    slots=(DB.routine.slots||[]).filter(function(s){
      if(s.days&&s.days.length>0)return s.days.includes(dateWday);
      return true;
    });
  }
  // Skill snapshot - so deleted skills still show in session history
  var skillSnap=(DB.skillSnapshots&&DB.skillSnapshots[d])?DB.skillSnapshots[d]:(DB.skills||[]);
  var prog=(DB.routine.dailyProgress&&DB.routine.dailyProgress[d])||{};
  var done=slots.filter(function(s){return !!prog[s.id];}).length;
  // Todos pending that day
  var pendingTodos=getDateTodos(d).filter(function(t){return !t.done;});

  var statHtml='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">';
  statHtml+='<div style="background:var(--surface2);border-radius:10px;padding:12px;text-align:center"><div style="font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.6px;margin-bottom:4px">LEARNING</div><div style="font-size:20px;font-weight:700;color:var(--accent)">'+hm(learn)+'</div></div>';
  statHtml+='<div style="background:var(--surface2);border-radius:10px;padding:12px;text-align:center"><div style="font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.6px;margin-bottom:4px">PRACTICE</div><div style="font-size:20px;font-weight:700;color:var(--green)">'+hm(prac)+'</div></div>';
  statHtml+='<div style="background:var(--surface2);border-radius:10px;padding:12px;text-align:center"><div style="font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.6px;margin-bottom:4px">READING</div><div style="font-size:20px;font-weight:700;color:var(--amber)">'+hm(read)+'</div></div>';
  statHtml+='</div>';

  var sessHtml='<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.6px;margin-bottom:8px">SESSIONS</div>';
  if(sessions.length){
    sessions.forEach(function(s){
      var sk=skillSnap.find(function(x){return x.id===s.skillId;})||DB.skills.find(function(x){return x.id===s.skillId;})||{name:'Unknown',color:'var(--accent)'};
      sessHtml+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">';
      sessHtml+='<div style="width:8px;height:8px;border-radius:2px;background:'+sk.color+';flex-shrink:0"></div>';
      sessHtml+='<span style="flex:1;font-size:13px;font-weight:500">'+sk.name+(s.topic?' · <span style="color:var(--muted);font-weight:400">'+s.topic+'</span>':'')+'</span>';
      sessHtml+='<span style="font-size:12px;color:var(--accent)">'+hm((s.learn||0)+(s.prac||0)+(s.read||0))+'</span>';
      sessHtml+='</div>';
    });
  } else {
    sessHtml+='<div style="color:var(--muted2);font-size:13px;font-style:italic">No sessions logged</div>';
  }
  sessHtml+='</div>';

  var routHtml='<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.6px;margin-bottom:8px">ROUTINE ('+done+'/'+slots.length+')</div>';
  if(slots.length){
    slots.forEach(function(s){
      var isDone=!!prog[s.id];
      routHtml+='<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">';
      routHtml+='<span style="font-size:14px">'+(isDone?'&#10003;':'&#9675;')+'</span>';
      routHtml+='<span style="font-size:13px;color:'+(isDone?'var(--green)':'var(--muted)')+';'+(isDone?'text-decoration:line-through':'')+'">'+s.task+'</span>';
      if(s.time)routHtml+='<span style="font-size:11px;color:var(--muted2);margin-left:auto">'+s.time+'</span>';
      routHtml+='</div>';
    });
  } else {
    routHtml+='<div style="color:var(--muted2);font-size:13px;font-style:italic">No routine set</div>';
  }
  routHtml+='</div>';

  var allTodos_d2=getDateTodos(d);
  var doneCnt_d2=allTodos_d2.filter(function(t){return t.done;}).length;
  var todoHtml='<div><div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.6px;margin-bottom:8px">TO-DOS ('+doneCnt_d2+'/'+allTodos_d2.length+' done)</div>';
  if(allTodos_d2.length){
    allTodos_d2.slice(0,5).forEach(function(t){
      todoHtml+='<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">';
      if(t.done){todoHtml+='<span style="font-size:13px;color:var(--green)">&#10003;</span><span style="font-size:13px;text-decoration:line-through;color:var(--muted)">'+t.text+'</span>';}
      else{todoHtml+='<span style="font-size:12px;color:var(--amber)">&#9633;</span><span style="font-size:13px">'+t.text+'</span>';}
      todoHtml+='</div>';
    });
    if(allTodos_d2.length>5)todoHtml+='<div style="font-size:11px;color:var(--muted2);margin-top:4px">+'+(allTodos_d2.length-5)+' more...</div>';
  } else {
    todoHtml+='<div style="color:var(--muted2);font-size:13px;font-style:italic">No tasks that day</div>';
  }
  todoHtml+='</div>';

  var isToday=d===today();
  var html='<div class="modal-overlay" id="daydtl-modal" onclick="if(event.target.id===\'daydtl-modal\')document.getElementById(\'daydtl-modal\').remove()">'
    +'<div class="modal" style="width:480px;max-height:80vh;overflow-y:auto">'
    +'<div class="modal-title" style="display:flex;align-items:center;gap:8px">'
    +'<span>&#128197;</span>'
    +'<span style="flex:1">'+(isToday?'<span style="color:var(--amber)">&mdash; Today &nbsp;</span>':'')+dayLabel+'</span>'
    +'<button class="close-btn" onclick="document.getElementById(\'daydtl-modal\').remove()">&#10005;</button>'
    +'</div>'
    +statHtml
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">'
    +sessHtml+routHtml
    +'</div>'
    +todoHtml
    +'</div></div>';
  document.body.insertAdjacentHTML('beforeend',html);
}


// ============ ACTIONS ============
function startT(k){if(timers[k].run)return;timers[k].run=true;timers[k].iv=setInterval(()=>{timers[k].s++;var el=document.getElementById('td-'+k);if(el)el.textContent=fmt(timers[k].s);var p=document.getElementById('tp-'+k);if(p)p.style.width=Math.min(100,Math.round(timers[k].s/GOAL_SECS*100))+'%';},1000);}
function stopT(k){clearInterval(timers[k].iv);timers[k].run=false;}
function resetT(k){stopT(k);timers[k].s=0;var el=document.getElementById('td-'+k);if(el)el.textContent=fmt(0);var p=document.getElementById('tp-'+k);if(p)p.style.width='0%';}

function saveTimerSession(){
  var skillId=document.getElementById('t-skill-sel')?.value||'';
  var topic=document.getElementById('t-topic')?.value.trim()||'';
  var note=document.getElementById('t-note')?.value.trim()||'';
  if(!timers.learn.s&&!timers.prac.s&&!timers.read.s){notify('Start a timer first!');return;}
  var d=today();
  if(!DB.sessions.find(s=>s.date===d&&!s.skillId)){
    DB.sessions.push({id:Date.now()+'',date:d,skillId,topic,note,learn:timers.learn.s,prac:timers.prac.s,read:timers.read.s,difficulty:'medium'});
  } else {
    DB.sessions.push({id:Date.now()+'',date:d,skillId,topic,note,learn:timers.learn.s,prac:timers.prac.s,read:timers.read.s,difficulty:'medium'});
  }
  save();notify('✓ Session saved!');
  var msg=document.getElementById('save-msg');if(msg){msg.style.display='inline';setTimeout(()=>msg.style.display='none',2000);}
}

function addLog(){
  var skillId=document.getElementById('log-skill')?.value;
  var topic=document.getElementById('log-topic')?.value.trim();
  var date=document.getElementById('log-date')?.value||today();
  var learn=parseInt(document.getElementById('log-learn')?.value||0)*60;
  var prac=parseInt(document.getElementById('log-prac')?.value||0)*60;
  var read=parseInt(document.getElementById('log-read')?.value||0)*60;
  var note=document.getElementById('log-note')?.value.trim();
  var diff=document.getElementById('log-diff')?.value||'medium';
  if(!topic){notify('Please enter a topic!');return;}
  if(!learn&&!prac&&!read){notify('Enter at least one time value!');return;}
  DB.sessions.push({id:Date.now()+'',date,skillId:skillId||'',topic,note,learn,prac,read,difficulty:diff});
  save();notify('✓ Session logged!');
  document.getElementById('log-topic').value='';
  document.getElementById('log-learn').value='';
  document.getElementById('log-prac').value='';
  document.getElementById('log-read').value='';
  document.getElementById('log-note').value='';
}

function deleteSession(id){DB.sessions=DB.sessions.filter(s=>s.id!==id);save();renders.history();}
function filterHistory(skillId){window._histFilter=skillId;nav('history');}

function renderTodoList(){
  var todos=getTodayTodos();
  if(!todos.length)return '<div class="empty">No tasks for today yet!</div>';
  return todos.map(t=>`<div class="todo-item">
    <input type="checkbox" class="todo-check" ${t.done?'checked':''} onchange="toggleTodo('${t.id}')">
    <div class="todo-body">
      <div class="todo-text ${t.done?'done':''}">${t.text}</div>
      <div class="todo-meta">
        <span class="tag tag-${t.type}">${t.type==='week'?'Weekly':t.type==='month'?'Monthly':t.type==='skill'?'Skill':t.type==='habit'?'Habit':'General'}</span>
        ${t.priority==='high'?'<span class="priority-high">! High</span>':t.priority==='low'?'<span style="font-size:10px;color:var(--muted2)">Low</span>':''}
      </div>
    </div>
    <button class="icon-btn" onclick="deleteTodo('${t.id}')">✕</button>
  </div>`).join('');
}

function getTodayTodos(){
  var d=today();
  if(!DB.dailyTodos)DB.dailyTodos={};
  if(!DB.dailyTodos[d])DB.dailyTodos[d]=[];
  return DB.dailyTodos[d];
}
function getDateTodos(d){
  if(!DB.dailyTodos)return [];
  return DB.dailyTodos[d]||[];
}
function addTodo(){
  var v=document.getElementById('todo-inp')?.value.trim();
  if(!v){notify('Enter a task!');return;}
  getTodayTodos().push({id:Date.now()+'',text:v,done:false,type:document.getElementById('todo-type')?.value||'todo',priority:document.getElementById('todo-priority')?.value||'med'});
  document.getElementById('todo-inp').value='';
  save();var el=document.getElementById('todo-list');if(el)el.innerHTML=renderTodoList();

function toggleTodo(id){var todos=getTodayTodos();var t=todos.find(x=>x.id===id);if(t)t.done=!t.done;save();var el=document.getElementById('todo-list');if(el)el.innerHTML=renderTodoList();}
function deleteTodo(id){var d=today();if(DB.dailyTodos&&DB.dailyTodos[d])DB.dailyTodos[d]=DB.dailyTodos[d].filter(x=>x.id!==id);save();var el=document.getElementById('todo-list');if(el)el.innerHTML=renderTodoList();}

function renderDeadlines(list){
  if(!list.length)return '<div class="empty">No deadlines.</div>';
  return list.map(d=>{
    var diff=days_between(d.date,today());
    var urgent=!d.done&&diff<=3;
    return `<div class="dl-item ${urgent?'dl-urgent':''}">
      <div class="dl-date-badge">
        <div class="dl-day">${new Date(d.date+'T12:00').getDate()}</div>
        <div class="dl-month">${MON_NAMES[new Date(d.date+'T12:00').getMonth()]}</div>
      </div>
      <div class="dl-info">
        <div class="dl-title ${d.done?'done':''}">${d.text}</div>
        <div class="dl-sub" style="display:flex;gap:10px;flex-wrap:wrap">
          ${d.skillId?`<span>${DB.skills.find(s=>s.id===d.skillId)?.name||'General'}</span>`:'<span>General</span>'}
          ${d.startDate?`<span style="color:var(--muted2)">Started: ${d.startDate}</span>`:''}
          ${d.completedDate?`<span style="color:var(--green)">✓ Completed: ${d.completedDate}</span>`:''}
        </div>
      </div>
      <span class="tag tag-${d.type}">${d.type==='week'?'Weekly':d.type==='month'?'Monthly':'Skill'}</span>
      ${!d.done?`<span class="days-left ${diff<=3?'days-over':diff<=7?'days-warn':'days-ok'}">${diff<0?'Overdue':diff===0?'Today':diff+'d'}</span>`:'<span style="font-size:11px;color:var(--green)">✓ Done</span>'}
      <input type="checkbox" style="width:auto" ${d.done?'checked':''} onchange="toggleDeadline('${d.id}')">
      <button class="icon-btn" onclick="deleteDeadline('${d.id}')">✕</button>
    </div>`;
  }).join('');
}

// Day-wise task edit functions
function openDayTaskEdit(){
  routineInit();
  var slots=DB.routine.slots;
  if(!slots.length){notify('No routine slots yet!');return;}
  var dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var curDay=new Date().getDay();
  var tabsHtml='';
  dayNames.forEach(function(dn,i){
    var active=i===curDay;
    tabsHtml+='<button onclick="switchDayTab('+i+')" id="daytab-'+i+'" style="padding:5px 11px;border-radius:20px;border:1.5px solid '+(active?'var(--accent)':'var(--border2)')+';background:'+(active?'var(--accent-glow)':'var(--surface2)')+';color:'+(active?'var(--accent)':'var(--muted)')+';font-size:12px;font-weight:600;cursor:pointer;font-family:DM Sans,sans-serif">'+dn.slice(0,3)+'</button>';
  });
  var html='<div class="modal-overlay" id="dayedit-modal" onclick="if(event.target.id===&quot;dayedit-modal&quot;)document.getElementById(&quot;dayedit-modal&quot;).remove()">'
    +'<div class="modal" style="width:500px">'
    +'<div class="modal-title">&#9999;&#65039; Edit Tasks by Day <button class="close-btn" onclick="document.getElementById(&quot;dayedit-modal&quot;).remove()">&#10005;</button></div>'
    +'<div style="font-size:12px;color:var(--muted);margin-bottom:12px">প্রতিটি দিনের জন্য আলাদাভাবে task customize করুন। খালি রাখলে default task দেখাবে।</div>'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">'+tabsHtml+'</div>'

    +'</div></div>';

function switchDayTab(dayIdx){
  window._editDay=dayIdx;
  for(var i=0;i<7;i++){
    var btn=document.getElementById('daytab-'+i);if(!btn)continue;
    if(i===dayIdx){btn.style.borderColor='var(--accent)';btn.style.background='var(--accent-glow)';btn.style.color='var(--accent)';}
    else{btn.style.borderColor='var(--border2)';btn.style.background='var(--surface2)';btn.style.color='var(--muted)';}
  }
  renderDaySlotList(dayIdx);
}
function renderDaySlotList(dayIdx){
  var dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var slots=DB.routine.slots;
  var container=document.getElementById('day-slot-list');if(!container)return;
  var html='<div style="font-size:12px;font-weight:600;color:var(--accent);margin-bottom:8px">'+dayNames[dayIdx]+' Tasks:</div>';
  slots.forEach(function(s){
    var key='day_'+dayIdx;
    var cur=(s.dayNotes&&s.dayNotes[key])||'';
    html+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">';
    html+='<div style="width:10px;height:10px;border-radius:3px;flex-shrink:0;background:'+(s.color||'var(--accent)')+'"></div>';
    html+='<div style="flex:1"><div style="font-size:11px;color:var(--muted);margin-bottom:3px">Default: <b style="color:var(--text)">'+s.task+'</b></div>';
    html+='<input type="text" id="daytask-'+s.id+'" value="'+cur+'" placeholder="Custom task for '+dayNames[dayIdx]+'... (leave empty for default)" style="font-size:12px"></div></div>';
  });
  container.innerHTML=html;
}
function saveDayTasks(){
  var dayIdx=window._editDay||0;
  DB.routine.slots.forEach(function(s){
    var inp=document.getElementById('daytask-'+s.id);if(!inp)return;
    if(!s.dayNotes)s.dayNotes={};
    var val=inp.value.trim();
    if(val)s.dayNotes['day_'+dayIdx]=val;
    else delete s.dayNotes['day_'+dayIdx];
  });
  save();
  var m=document.getElementById('dayedit-modal');if(m)m.remove();
  notify('Day tasks saved!');renders.routine();
}


// ============ ROUTINE HELPERS ============
function routineInit(){if(!DB.routine){DB.routine={slots:[],dailyProgress:{}};}if(!DB.routine.slots)DB.routine.slots=[];if(!DB.routine.dailyProgress)DB.routine.dailyProgress={};}
function routineCheckReset(){
  routineInit();
  var d=today();
  if(!DB.routine.dailyProgress[d])DB.routine.dailyProgress[d]={};
  // Re-run initDailySnapshot in case it wasn't run yet today
  initDailySnapshot(d);
}
function routineSaveSnapshot(d){initDailySnapshot(d);}


// Dashboard single row routine
function renderRoutineDashRow(){
  routineInit();
  var d=today();
  var todayWday=new Date().getDay();
  var prog=DB.routine.dailyProgress[d]||{};
  // Filter slots: only show slots assigned to today's weekday
  var slots=DB.routine.slots.filter(function(s){
    if(s.days&&s.days.length>0)return s.days.includes(todayWday);
    return true; // old slots without days array show every day
  });
  if(!slots.length)return '<div class="empty">No routine set for today — go to Routine page to add tasks.</div>';
  var done=slots.filter(function(s){return !!prog[s.id];}).length;
  var pct=Math.round(done/slots.length*100);
  var pColor=pct===100?'var(--green)':pct>=60?'var(--accent)':'var(--coral)';
  var html='';
  html+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">';
  html+='<div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:5px">';
  html+='<span style="font-size:12px;font-weight:600;color:var(--text)">'+done+' of '+slots.length+' completed</span>';
  html+='<span style="font-size:12px;font-weight:700;color:'+pColor+'">'+pct+'%</span>';
  html+='</div><div style="height:7px;background:var(--surface3);border-radius:4px;overflow:hidden">';
  html+='<div style="height:100%;width:'+pct+'%;background:'+pColor+';border-radius:4px;transition:.4s"></div>';
  html+='</div></div>';

  html+='</div>';
  html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px">';
  slots.forEach(function(s){
    var isDone=!!prog[s.id];
    var dayKey='day_'+new Date().getDay();
    var taskLabel=(s.dayNotes&&s.dayNotes[dayKey])||s.task;
    var bg=isDone?'var(--green-bg)':'var(--surface2)';

    html+='<div style="position:absolute;top:0;left:0;width:3px;height:100%;background:'+ac+'"></div>';
    html+='<div style="display:flex;align-items:center;gap:6px;padding-left:6px">';
    html+='<span style="flex:1;font-size:12px;font-weight:600;'+(isDone?'text-decoration:line-through;color:var(--muted)':'color:var(--text)')+'">'+taskLabel+'</span>';
    if(isDone)html+='<span style="color:var(--green);font-size:14px">&#10003;</span>';
    html+='</div>';
    if(s.time)html+='<div style="padding-left:6px"><span style="font-size:11px;font-weight:700;color:var(--accent);background:var(--accent)18;padding:1px 7px;border-radius:6px;letter-spacing:.3px">'+s.time+'</span></div>';
    if(s.category)html+='<div style="padding-left:6px"><span style="font-size:10px;padding:2px 8px;border-radius:10px;background:'+ac+'22;color:'+ac+';font-weight:600">'+s.category+'</span></div>';

  html+='</div>';
  return html;

function routineToggleDash(slotId){
  routineCheckReset();

  DB.routine.dailyProgress[d][slotId]=!DB.routine.dailyProgress[d][slotId];

}

function switchRoutineDay(di){
  window._routineActiveDay=di;
  renders.routine();
}


function addRoutineSlot(){
  routineInit();
  var activeDay=window._routineActiveDay!==undefined?window._routineActiveDay:new Date().getDay();
  var dayNames7=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var cats=['Study','Practice','Exercise','Reading','Break','Prayer','Work','Other'];
  var html='<div class="modal-overlay" id="routine-modal" onclick="if(event.target.id===\'routine-modal\')document.getElementById(\'routine-modal\').remove()">'
    +'<div class="modal">'
    +'<div class="modal-title">Add Task — <span style="color:var(--accent)">'+dayNames7[activeDay]+'</span>'
    +' <button class="close-btn" onclick="document.getElementById(\'routine-modal\').remove()">&#10005;</button></div>'
    +'<div class="field"><div class="label">Time (e.g. 6:00 – 8:00)</div><input type="text" id="rs-time" placeholder="6:00 – 8:00"></div>'
    +'<div class="field"><div class="label">Task / Activity *</div><input type="text" id="rs-task" placeholder="e.g. Python practice..."></div>'
    +'<div class="field"><div class="label">Category</div>'
    +'<select id="rs-cat">'+cats.map(function(c){return '<option>'+c+'</option>';}).join('')+'</select></div>'
    +'<div class="field"><div class="label">Color</div>'
    +'<div class="skill-color-pick">'+COLORS.map(function(c,i){return '<div class="color-swatch '+(i===0?'selected':'')+'" style="background:'+c+'" onclick="selectColor(\''+c+'\',this)"></div>';}).join('')+'</div></div>'
    +'<div class="field"><div class="label">Note</div><input type="text" id="rs-note" placeholder="Optional note..."></div>'
    +'<button class="btn btn-accent" style="width:100%;margin-top:8px" onclick="saveRoutineSlot()">Add to '+dayNames7[activeDay]+'</button>'
    +'</div></div>';
  document.body.insertAdjacentHTML('beforeend',html);
  window._pickedColor=COLORS[0];
}
function saveRoutineSlot(){
  var task=document.getElementById('rs-task')?.value.trim();
  if(!task){notify('Enter a task!');return;}
  snapshotAllPastDates(); // freeze past dates before adding new slot
  var activeDay=window._routineActiveDay!==undefined?window._routineActiveDay:new Date().getDay();
  DB.routine.slots.push({
    id:Date.now()+'',
    time:document.getElementById('rs-time')?.value.trim()||'',
    task:task,
    category:document.getElementById('rs-cat')?.value||'General',
    color:window._pickedColor||COLORS[0],
    note:document.getElementById('rs-note')?.value.trim()||'',
    days:[activeDay]
  });
  save();document.getElementById('routine-modal')?.remove();notify('&#10003; Task added for '+['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][activeDay]+'!');renders.routine();
}
function toggleRoutineSlot(slotId){
  routineCheckReset();
  var d=today();
  if(!DB.routine.dailyProgress[d])DB.routine.dailyProgress[d]={};
  DB.routine.dailyProgress[d][slotId]=!DB.routine.dailyProgress[d][slotId];
  save();renders.routine();
}

function snapshotAllPastDates(){
  // Freeze only PAST dates — never today (today stays live)
  var todayStr=today();
  if(!DB.routine.snapshots)DB.routine.snapshots={};
  var allDates=Object.keys(DB.routine.dailyProgress||{});
  allDates.forEach(function(d){
    if(d===todayStr)return; // skip today — it's always live
    if(!DB.routine.snapshots[d]){
      var wday=new Date(d+'T12:00').getDay();
      var daySlots=(DB.routine.slots||[]).filter(function(s){
        if(s.days&&s.days.length>0)return s.days.includes(wday);
        return true;
      });
      DB.routine.snapshots[d]=daySlots.map(function(s){
        return {id:s.id,task:s.task,time:s.time,category:s.category,color:s.color};
      });
    }
  });
  if(!DB.skillSnapshots)DB.skillSnapshots={};
  var sessionDates=Object.keys(DB.sessions.reduce(function(acc,s){acc[s.date]=1;return acc;},{}));
  sessionDates.forEach(function(d){
    if(d===todayStr)return;
    if(!DB.skillSnapshots[d]){
      DB.skillSnapshots[d]=(DB.skills||[]).map(function(s){
        return {id:s.id,name:s.name,color:s.color};
      });
    }
  });
  // Always refresh today's snapshot after any mutation
  initDailySnapshot(todayStr);
}
function deleteRoutineSlot(id){
  snapshotAllPastDates(); // freeze all past dates before mutating
  DB.routine.slots=DB.routine.slots.filter(function(s){return s.id!==id;});
  save();renders.routine();
}
function moveRoutineSlot(slotId,dir){
  var arr=DB.routine.slots;
  var idx=arr.findIndex(function(s){return s.id===slotId;});
  if(idx<0)return;
  var newIdx=idx+dir;
  if(newIdx<0||newIdx>=arr.length)return;
  var tmp=arr[idx];arr[idx]=arr[newIdx];arr[newIdx]=tmp;
  save();renders.routine();
}
function editRoutineCell(slotId,field){
  var s=DB.routine.slots.find(x=>x.id===slotId);if(!s)return;
  var el=document.getElementById('r'+field+'-'+slotId);if(!el)return;
  var cur=field==='time'?s.time:field==='task'?s.task:field==='category'?s.category:s.note;
  var inp=document.createElement('input');
  inp.value=cur||'';
  inp.style.cssText='background:var(--surface3);border:1.5px solid var(--accent);border-radius:5px;padding:3px 8px;font-size:13px;color:var(--text);font-family:DM Sans,sans-serif;width:100%';
  el.innerHTML='';el.appendChild(inp);inp.focus();
  function commit(){
    snapshotAllPastDates();
    var val=inp.value.trim();
    if(field==='time')s.time=val;
    else if(field==='task')s.task=val||s.task;
    else if(field==='category')s.category=val||'General';
    else s.note=val;
    save();renders.routine();
  }
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')commit();if(e.key==='Escape')renders.routine();});
}



// ============ SKILL SLIDER ============
var _sliderIdx=0;var _sliderTimer=null;
function renderSkillSlider(){
  var skills=DB.skills;
  if(!skills||!skills.length){
    return '<div style="color:var(--muted);font-size:12px;font-style:italic;padding:8px 0">No skills yet — <a onclick="nav(\'skills\')" style="color:var(--accent);cursor:pointer">add one →</a></div>';
  }
  var slides=skills.map(function(sk,i){
    var tot=skill_total(sk.id);
    var maxH=sk.goalHours||100;
    var learnH=Math.round(tot.learn/3600*10)/10;
    var pracH=Math.round(tot.prac/3600*10)/10;
    var totalH=learnH+pracH;
    var pct=Math.min(100,Math.round(totalH/maxH*100));
    var circ=2*Math.PI*32;var dash=circ*(pct/100);
    var ring='<svg width="72" height="72" viewBox="0 0 72 72" style="flex-shrink:0">'
      +'<circle cx="36" cy="36" r="32" fill="none" stroke="var(--surface3)" stroke-width="6"/>'
      +'<circle cx="36" cy="36" r="32" fill="none" stroke="'+sk.color+'" stroke-width="6" stroke-linecap="round"'
      +' stroke-dasharray="'+dash.toFixed(1)+' '+(circ-dash).toFixed(1)+'" transform="rotate(-90 36 36)"/>'
      +'<text x="36" y="40" text-anchor="middle" font-size="13" font-weight="800" fill="'+sk.color+'" font-family="DM Sans,sans-serif">'+pct+'%</text>'
      +'</svg>';

    // Badge next to skill name: from sk.deadline (skill's own goal deadline)
    var skNameBadge='';
    if(sk.deadline){
      var badgeDiff=days_between(sk.deadline,today());
      var badgeCl=badgeDiff<=3?'var(--coral)':badgeDiff<=7?'var(--amber)':'var(--green)';
      skNameBadge='<span style="font-size:10px;font-weight:800;color:'+badgeCl+';border:1.5px solid '+badgeCl+';padding:1px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0">'+(badgeDiff===0?'⚡TODAY':badgeDiff<0?'⚠OVERDUE':'📅 '+badgeDiff+'d')+'</span>';
    }

    // Below progress bar: show task deadlines linked to this skill (DB.deadlines)
    var taskDls=(DB.deadlines||[]).filter(function(dl){return dl.skillId===sk.id&&!dl.done;}).sort(function(a,b){return a.date.localeCompare(b.date);});
    var dlHtml='';
    if(taskDls.length){
      dlHtml='<div style="margin-top:8px;max-height:80px;overflow-y:auto;padding-right:4px">'
        +taskDls.map(function(dl){
          var diff=days_between(dl.date,today());
          var urgent=diff<=3;var warn=diff<=7&&diff>3;
          var cl=urgent?'var(--coral)':warn?'var(--amber)':'var(--green)';
          var bg=urgent?'var(--coral-bg)':warn?'var(--amber-bg)':'var(--green-bg)';
          var bdr=urgent?'rgba(255,107,107,0.25)':warn?'rgba(245,200,66,0.2)':'rgba(61,214,140,0.15)';
          return '<div style="display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:7px;margin-bottom:3px;background:'+bg+';border:1px solid '+bdr+'">'
            +'<span style="font-size:11px;flex:1;color:var(--text);font-weight:'+(urgent?700:500)+'">'+dl.text+'</span>'
            +'<span style="font-size:10px;font-weight:800;color:'+cl+';white-space:nowrap;border:1.5px solid '+cl+';padding:1px 6px;border-radius:5px">'+(diff===0?'TODAY':diff<0?'OVERDUE':diff+'d')+'</span>'
            +'</div>';
        }).join('')+'</div>';
    } else {
      dlHtml='<div style="font-size:10px;color:var(--muted2);margin-top:6px;font-style:italic">No deadlines</div>';
    }

    return '<div class="skill-slide'+(i===0?' active':'')+'" id="skill-slide-'+i+'">'
      +'<div style="display:flex;align-items:flex-start;gap:12px">'
      +ring
      +'<div style="flex:1;min-width:0">'
      +'<div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:2px">'
      +'<div style="width:9px;height:9px;border-radius:2px;background:'+sk.color+';flex-shrink:0"></div>'
      +'<div style="font-size:14px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px">'+sk.name+'</div>'
      +skNameBadge
      +'</div>'
      +'<div style="font-size:10px;color:var(--muted);margin-bottom:6px">'+totalH+'h / '+maxH+'h goal &nbsp;·&nbsp; L:'+learnH+'h P:'+pracH+'h</div>'
      +'<div style="height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-bottom:2px">'
      +'<div style="height:100%;width:'+pct+'%;background:'+sk.color+';border-radius:3px;transition:width .4s"></div></div>'
      +dlHtml
      +'</div></div></div>';
  }).join('');

  var dots=skills.length>1?'<div class="slider-dots">'+skills.map(function(sk,i){
    return '<div class="slider-dot'+(i===0?' active':'')+'" onclick="goSkillSlide('+i+')" id="sdot-'+i+'"></div>';
  }).join('')+'</div>':'<div></div>';

  var nav='<div class="slider-nav" style="margin-top:10px">'
    +(skills.length>1?'<button class="slider-btn" onclick="prevSkillSlide()">&#8592;</button>':'<div></div>')
    +dots
    +(skills.length>1?'<button class="slider-btn" onclick="nextSkillSlide()">&#8594;</button>':'<div></div>')
    +'</div>';

  return '<div id="skill-slider-wrap">'+slides+(skills.length>1?nav:'')+'</div>';
}

function goSkillSlide(idx){
  var skills=DB.skills;if(!skills||!skills.length)return;
  var n=skills.length;
  _sliderIdx=(idx+n)%n;
  document.querySelectorAll('.skill-slide').forEach(function(el,i){el.classList.toggle('active',i===_sliderIdx);});
  document.querySelectorAll('.slider-dot').forEach(function(el,i){el.classList.toggle('active',i===_sliderIdx);});
}
function nextSkillSlide(){goSkillSlide(_sliderIdx+1);}
function prevSkillSlide(){goSkillSlide(_sliderIdx-1);}
function startSliderAuto(){
  if(_sliderTimer)clearInterval(_sliderTimer);
  if(DB.skills&&DB.skills.length>1){
    _sliderTimer=setInterval(function(){
      if(document.getElementById('skill-slider-wrap'))nextSkillSlide();
      else{clearInterval(_sliderTimer);}
    },4000);
  }
}

// ============ INIT ============
loadTheme();
appStart();

</script>
</body>
</html>
